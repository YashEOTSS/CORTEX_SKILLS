<!DOCTYPE html>
<html>
<head>
    <title>{{TITLE}}</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .info { padding: 8px 12px; font: 13px/17px sans-serif; background: rgba(255,255,255,0.92); box-shadow: 0 1px 5px rgba(0,0,0,0.3); border-radius: 6px; max-width: 280px; }
        .info h4 { margin: 0 0 5px; color: #333; font-size: 14px; }
        .info b { color: #1a73e8; }
        .title-bar { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(27,42,74,0.92); color: white; padding: 8px 20px; border-radius: 6px; font-size: 16px; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="title-bar">{{TITLE}} ({{FEATURE_COUNT}} points)</div>
    <div id="map"></div>
    <script>
        var geojsonData = {{GEOJSON_DATA}};
        var map = L.map('map').setView([42.2, -71.8], 8);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19
        }).addTo(map);

        var info = L.control();
        info.onAdd = function(map) { this._div = L.DomUtil.create('div','info'); this.update(); return this._div; };
        info.update = function(props) {
            this._div.innerHTML = '<h4>Point Info</h4>' +
                (props ? Object.keys(props).map(function(k) { return '<b>' + k + ':</b> ' + props[k]; }).join('<br/>')
                : 'Hover over a point');
        };
        info.addTo(map);

        var colors = ['#2196F3','#FF9800','#E91E63','#4CAF50','#9C27B0','#00BCD4','#FF5722','#607D8B'];
        var categoryField = null;
        var categoryMap = {};
        var colorIndex = 0;

        function getColor(feature) {
            if (!categoryField) {
                var keys = Object.keys(feature.properties);
                for (var i = 0; i < keys.length; i++) {
                    if (keys[i].toLowerCase().indexOf('type') >= 0 || keys[i].toLowerCase().indexOf('category') >= 0 || keys[i].toLowerCase().indexOf('class') >= 0) {
                        categoryField = keys[i]; break;
                    }
                }
                if (!categoryField && keys.length > 2) categoryField = keys[keys.length - 1];
            }
            if (!categoryField) return colors[0];
            var val = feature.properties[categoryField];
            if (!(val in categoryMap)) { categoryMap[val] = colors[colorIndex++ % colors.length]; }
            return categoryMap[val];
        }

        function pointToLayer(feature, latlng) {
            return L.circleMarker(latlng, {
                radius: 5, fillColor: getColor(feature), color: '#333',
                weight: 0.8, opacity: 1, fillOpacity: 0.75
            });
        }

        function onEachFeature(feature, layer) {
            layer.on({
                mouseover: function(e) { e.target.setStyle({ radius: 8, weight: 2, fillOpacity: 1 }); info.update(feature.properties); },
                mouseout: function(e) { e.target.setStyle({ radius: 5, weight: 0.8, fillOpacity: 0.75 }); info.update(); }
            });
            var label = feature.properties[Object.keys(feature.properties)[1]] || feature.properties[Object.keys(feature.properties)[0]] || '';
            layer.bindTooltip(String(label), { sticky: true, direction: 'top' });
        }

        var geojsonLayer = L.geoJson(geojsonData, { pointToLayer: pointToLayer, onEachFeature: onEachFeature }).addTo(map);
        map.fitBounds(geojsonLayer.getBounds().pad(0.05));
        L.control.scale({imperial: false}).addTo(map);
    </script>
</body>
</html>
